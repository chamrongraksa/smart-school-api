server:
  port: 8081

spring:
  datasource:
    # 🌟 Notice the port changed to 5433 for your local Docker setup
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/smartschool}
    username: ${DB_USERNAME:postgres}
    # 🌟 Change "your_local_password" to whatever password you actually use on your laptop
    password: ${DB_PASSWORD:your_local_password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

