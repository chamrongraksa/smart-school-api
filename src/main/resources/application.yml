server:
  port: 8081

spring:
  datasource:
    # 🌟 If DATABASE_URL is provided by the cloud, use it. Otherwise, fallback to localhost.
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/smartschool}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres} # Change this back to your local password if it's different!
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

